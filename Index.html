/* ============================================================ DATA-SOURCE CONFIG ============================================================ */
const SOURCES = [
  { id: "sales", label: "OPEN ORDERS", subtitle: "15072026 — SAP open sales order list",
    hint: "Sold-To · Order Number · Created On · Material · QTY · Item Description · UoM · REF", icon: SheetIcon },

    hint: "Material · Material Description · Base Unit of Measure · Inventory", icon: BoxIcon },

    hint: "Sold-To · Sales Document · Material · Order Qty · Net Price · Currency", icon: SheetIcon },
  { id: "source", label: "CUSTOMER MASTER", subtitle: "SOURCE — customer code lookup",
    hint: "Customer Code · Customer Name · Location · Region", icon: UsersIcon },

/* ============================================================ PARSING HELPERS ============================================================ */
function normalizeHeader(h) { return String(h ?? "").trim().toLowerCase().replace(/\s+/g, " "); }
function buildHeaderMap(row) { const map = new Map(); Object.keys(row || {}).forEach((k) => map.set(normalizeHeader(k), k)); return map; }
function resolveField(row, aliases, headerMap) {
  for (const alias of aliases) { const norm = normalizeHeader(alias); if (headerMap.has(norm)) return row[headerMap.get(norm)]; }
  return undefined;
}
function normId(v) {
  if (v === null || v === undefined) return "";
  if (typeof v === "number") return String(v);
  return String(v).trim();
}
function parseWorkbook(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(e.target.result, { type: "array", cellDates: true });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: "", raw: true });
        resolve(rows);
      } catch (err) { reject(err); }
    };
    reader.onerror = () => reject(new Error("Could not read file"));
    reader.readAsArrayBuffer(file);
  });
}

/* ============================================================ COMPUTE PIPELINE ============================================================ */
function computePipeline({ sales, stock, value, source, setting }) {
  const stockHM = buildHeaderMap(stock[0]);
  const stockMap = new Map();
  stock.forEach((r) => {
    const material = normId(resolveField(r, ["Material", "Material  "], stockHM));
    const inventory = resolveField(r, ["INVENTORY", "Inventory"], stockHM);
    stockMap.set(material, Number(inventory) || 0);
  });

  const valueHM = buildHeaderMap(value[0]);
  const valueMap = new Map();
  value.forEach((r) => {
    const salesDoc = normId(resolveField(r, ["Sales Document", "ORDER NUMBER"], valueHM));
    const material = normId(resolveField(r, ["Material", "Material  "], valueHM));
    const conc = salesDoc + material;
    const netPrice = resolveField(r, ["Net Price"], valueHM);
    const currency = resolveField(r, ["Document Currency", "Currency"], valueHM);
    valueMap.set(conc, { netPrice: Number(netPrice), currency });
  });

  const sourceHM = buildHeaderMap(source[0]);
  const sourceMap = new Map();
  source.forEach((r) => {
    const code = normId(resolveField(r, ["CUSTOMER CODE", "Sold-To", "Sold-To Party"], sourceHM));
    sourceMap.set(code, {
      customerName: resolveField(r, ["CUSTOMER NAME"], sourceHM),
      location: resolveField(r, ["LOCATION"], sourceHM),
      region: resolveField(r, ["REGION"], sourceHM),
    });
  });

  const settingHM = buildHeaderMap(setting[0]);
  const settingMap = new Map();
  setting.forEach((r) => {
    const material = normId(resolveField(r, ["Material", "Material  "], settingHM));
    settingMap.set(material, {
      packSize: Number(resolveField(r, ["PACK SIZE"], settingHM)) || 0,
      invPerUom: Number(resolveField(r, ["INV/ UoM", "INV/UoM"], settingHM)) || 0,
    });
  });

  const salesHM = buildHeaderMap(sales[0]);
  const today = new Date(); today.setHours(0, 0, 0, 0);

  const issues = { missingCustomer: new Set(), missingMaterial: new Set(), missingPrice: 0, missingStock: new Set() };

  const computed = sales.map((r, i) => {
    const soldTo = normId(resolveField(r, ["Sold-To", "Sold-To Party"], salesHM));
    const orderNumber = normId(resolveField(r, ["ORDER NUMBER", "Sales Document"], salesHM));
    const createdOnRaw = resolveField(r, ["CREATED ON", "Document Date"], salesHM);
    const material = normId(resolveField(r, ["Material", "Material  "], salesHM));
    const qty = Number(resolveField(r, ["QTY", "Order Quantity"], salesHM)) || 0;
    const itemDescription = resolveField(r, ["Item Description"], salesHM);
    const uom = resolveField(r, ["UoM"], salesHM);
    const ref = resolveField(r, ["REF"], salesHM);

    const conc = orderNumber + material;
    const valueMatch = valueMap.get(conc);
    const netPrice = valueMatch ? valueMatch.netPrice : null;
    const cur = valueMatch ? valueMatch.currency : "";
    if (!valueMatch) issues.missingPrice++;

    const srcMatch = sourceMap.get(soldTo);
    if (!srcMatch) issues.missingCustomer.add(soldTo);
    const customerName = srcMatch ? srcMatch.customerName : "#N/A";
    const location = srcMatch ? srcMatch.location : "#N/A";
    const region = srcMatch ? srcMatch.region : "#N/A";

    const setMatch = settingMap.get(material);
    if (!setMatch) issues.missingMaterial.add(material);
    const packSize = setMatch ? setMatch.packSize : 0;
    const invPerUom = setMatch ? setMatch.invPerUom : 0;

    const qtyDR = packSize ? (qty * packSize) / 20 : 0;
    const volume = packSize * qty;
    const netValue = netPrice != null ? qty * netPrice : 0;

    const stockQty = stockMap.get(material);
    if (stockQty === undefined) issues.missingStock.add(material);
    const inventory = stockQty !== undefined && invPerUom ? stockQty / invPerUom : 0;

    const createdOn = createdOnRaw instanceof Date ? createdOnRaw : createdOnRaw ? new Date(createdOnRaw) : null;
    const days = createdOn ? Math.round((createdOn - today) / 86400000) : null;
    const keep = qty <= inventory;

    return { id: i, soldTo, orderNumber, createdOn, material, qty, itemDescription, uom, ref,
      netPrice, cur, customerName, location, region, packSize, qtyDR, volume, netValue, inventory, days, keep };
  });

  const withoutOOS = computed.filter((r) => r.keep);

  const pivotMap = new Map();
  withoutOOS.forEach((r) => {
    const key = [r.region, r.customerName, r.location].join("||");
    if (!pivotMap.has(key)) pivotMap.set(key, { region: r.region, customerName: r.customerName, location: r.location, qty: 0, volume: 0, netValue: 0, qtyDR: 0 });
    const p = pivotMap.get(key);
    p.qty += r.qty; p.volume += r.volume; p.netValue += r.netValue; p.qtyDR += r.qtyDR;
  });
  const newOpenSalesOrder = [...pivotMap.values()].sort((a, b) => b.netValue - a.netValue);
  const oosRows = computed.filter((r) => !r.keep);

  const kpis = {
    totalLines: computed.length,
    totalValue: computed.reduce((s, r) => s + r.netValue, 0),
    keptLines: withoutOOS.length,
    keptValue: withoutOOS.reduce((s, r) => s + r.netValue, 0),
    oosLines: oosRows.length,
    oosValue: oosRows.reduce((s, r) => s + r.netValue, 0),
    customers: new Set(withoutOOS.map((r) => r.customerName)).size,
  };

  return { computed, withoutOOS, newOpenSalesOrder, kpis, issues };
}

/* ============================================================ DOWNLOAD ============================================================ */
function downloadWorkbook(report) {
  const wb = XLSX.utils.book_new();
  const pivotSheet = XLSX.utils.json_to_sheet(report.newOpenSalesOrder.map((p) => ({
    REGION: p.region, "CUSTOMER NAME": p.customerName, LOCATION: p.location,
    "SUM OF QTY": Math.round(p.qty * 100) / 100, "SUM OF VOLUME": Math.round(p.volume * 100) / 100,
    "SUM OF NET VALUE": Math.round(p.netValue * 100) / 100, "SUM OF QTY(DR)": Math.round(p.qtyDR * 100) / 100,
  })));
  XLSX.utils.book_append_sheet(wb, pivotSheet, "NEW OPEN SALES ORDER");

  const linesSheet = XLSX.utils.json_to_sheet(report.withoutOOS.map((r) => ({
    QTY: r.qty, "ITEM DESCRIPTION": r.itemDescription, UOM: r.uom, REF: r.ref, VOLUME: r.volume,
    "NET VALUE": Math.round(r.netValue * 100) / 100, CUR: r.cur, "CUSTOMER NAME": r.customerName,
    LOCATION: r.location, REGION: r.region, "PACK SIZE": r.packSize, "QTY(DR)": r.qtyDR,
  })));
  XLSX.utils.book_append_sheet(wb, linesSheet, "WITHOUT OOS");

  const fullSheet = XLSX.utils.json_to_sheet(report.computed.map((r) => ({
    "SOLD-TO": r.soldTo, "ORDER NUMBER": r.orderNumber, "CREATED ON": r.createdOn ? r.createdOn.toISOString().slice(0, 10) : "",
    MATERIAL: r.material, QTY: r.qty, "ITEM DESCRIPTION": r.itemDescription, UOM: r.uom, REF: r.ref,
    "NET PRICE": r.netPrice, CUR: r.cur, "CUSTOMER NAME": r.customerName, LOCATION: r.location, REGION: r.region,
    "PACK SIZE": r.packSize, VOLUME: r.volume, "NET VALUE": Math.round(r.netValue * 100) / 100, "QTY(DR)": r.qtyDR,
    INVENTORY: Math.round(r.inventory * 100) / 100, DAYS: r.days, "IN STOCK?": r.keep ? "YES" : "OUT OF STOCK",
  })));
  XLSX.utils.book_append_sheet(wb, fullSheet, "15072026 (computed)");
  XLSX.writeFile(wb, "NEW_OPEN_SALES_ORDER.xlsx");
}

// "Print" = export exactly what's on screen for the active tab, as a single-sheet Excel file.
function printCurrentView(tab, report) {
  let rows, sheetName, fileName;

  if (tab === "overview") {
    sheetName = "NEW OPEN SALES ORDER";
    fileName = "New_Open_Sales_Order.xlsx";
    rows = report.newOpenSalesOrder.map((p) => ({
      REGION: p.region, CUSTOMER: p.customerName, LOCATION: p.location,
      QTY: Math.round(p.qty * 100) / 100, VOLUME: Math.round(p.volume * 100) / 100,
      "NET VALUE": Math.round(p.netValue * 100) / 100, "QTY (DR)": Math.round(p.qtyDR * 100) / 100,
    }));
  } else if (tab === "lines") {
    sheetName = "ORDER LINES";
    fileName = "Order_Lines.xlsx";
    rows = report.withoutOOS.map((r) => ({
      ITEM: r.itemDescription, CUSTOMER: r.customerName, LOCATION: r.location,
      QTY: r.qty, "NET VALUE": Math.round(r.netValue * 100) / 100, CUR: r.cur,
    }));
  } else {
    sheetName = "OUT OF STOCK";
    fileName = "Out_of_Stock.xlsx";
    rows = report.computed.filter((r) => !r.keep).map((r) => ({
      ITEM: r.itemDescription, CUSTOMER: r.customerName,
      "QTY ORDERED": r.qty, "QTY AVAILABLE": Math.round(r.inventory * 100) / 100,
      "VALUE BLOCKED": Math.round(r.netValue * 100) / 100,
    }));
  }

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(rows);
  XLSX.utils.book_append_sheet(wb, ws, sheetName);
  XLSX.writeFile(wb, fileName);
}

/* ============================================================ UI HELPERS ============================================================ */
function fmtNum(n, decimals = 0) {
  if (n === null || n === undefined || Number.isNaN(n)) return "—";
  return n.toLocaleString("en-NG", { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}
function fmtNaira(n) { return "₦" + fmtNum(n, 0); }

/* ============================================================ MAIN APP ============================================================ */
function OpenOrderConsole() {
  const [uploads, setUploads] = useState({});
  const [parsing, setParsing] = useState({});
  const [parseErrors, setParseErrors] = useState({});
  const [report, setReport] = useState(null);
  const [generating, setGenerating] = useState(false);
  const [tab, setTab] = useState("overview");
  const [issuesOpen, setIssuesOpen] = useState(false);
  const [theme, setTheme] = useState("dark");
  const fileInputs = useRef({});

  useEffect(() => { applyTheme(theme); }, [theme]);

  const allUploaded = SOURCES.every((s) => uploads[s.id]);

  const handleFile = useCallback(async (id, file) => {
    if (!file) return;
    setParsing((p) => ({ ...p, [id]: true }));
    setParseErrors((p) => ({ ...p, [id]: null }));
    try {
      const rows = await parseWorkbook(file);
      if (!rows.length) throw new Error("No rows found in file");
      setUploads((u) => ({ ...u, [id]: { fileName: file.name, rows, rowCount: rows.length } }));
      setReport(null);
    } catch (err) {
      setParseErrors((p) => ({ ...p, [id]: err.message || "Could not parse file" }));
    } finally {
      setParsing((p) => ({ ...p, [id]: false }));
    }
  }, []);

  const clearFile = useCallback((id) => {
    setUploads((u) => { const next = { ...u }; delete next[id]; return next; });
    setReport(null);
    if (fileInputs.current[id]) fileInputs.current[id].value = "";
  }, []);

  const handleGenerate = useCallback(() => {
    if (!allUploaded) return;
    setGenerating(true);
    setTimeout(() => {
      try {
        const result = computePipeline({
          sales: uploads.sales.rows, stock: uploads.stock.rows, value: uploads.value.rows,
          source: uploads.source.rows, setting: uploads.setting.rows,
        });
        setReport(result);
        setTab("overview");
      } catch (err) {
        setParseErrors((p) => ({ ...p, _compute: err.message }));
      } finally { setGenerating(false); }
    }, 50);
  }, [uploads, allUploaded]);

  const handleReset = useCallback(() => {
    setUploads({}); setReport(null); setParseErrors({});
    Object.values(fileInputs.current).forEach((el) => el && (el.value = ""));
  }, []);

  return (
    <div className="min-h-screen w-full bg-[var(--bg)] text-[var(--text)]" style={{fontFamily: "ui-sans-serif, system-ui, -apple-system, sans-serif"}}>
      <header className="border-b border-[var(--border)] px-6 py-5 md:px-10">
        <div className="mx-auto flex max-w-6xl items-center justify-between">
          <div>
            <div className="flex items-center gap-2 text-[11px] font-bold uppercase tracking-[0.25em] text-[var(--accent)]">
              <span className="h-1.5 w-1.5 rounded-full bg-[var(--accent)]" />
              Sales Ops Console
            </div>
            <h1 className="mt-1 text-2xl font-extrabold uppercase tracking-tight text-[var(--text)] md:text-3xl">Open Order Line</h1>
          </div>
          <div className="flex items-center gap-3">
            <div className="flex items-center gap-1.5 rounded-md border border-[var(--border-alt)] p-1">
              {Object.entries(THEMES).map(([key, t]) => (
                <button
                  key={key}
                  onClick={() => setTheme(key)}
                  title={t.label}
                  className={"h-6 w-6 rounded transition " + (theme === key ? "ring-2 ring-offset-2 ring-offset-[var(--panel)]" : "opacity-60 hover:opacity-100")}
                  style={{ backgroundColor: t.swatch, ...(theme === key ? { "--tw-ring-color": t.swatch } : {}) }}
                />
              ))}
            </div>
            {(allUploaded || Object.keys(uploads).length > 0) && (
              <button onClick={handleReset} className="flex items-center gap-1.5 rounded-md border border-[var(--border-alt)] px-3 py-2 text-xs font-semibold uppercase tracking-wide text-[var(--text-muted)] transition hover:border-[var(--border-hover)] hover:text-[var(--text)]">
                <RotateIcon size={13} /> Reset
              </button>
            )}
          </div>
        </div>
      </header>

      <main className="mx-auto max-w-6xl px-6 py-8 md:px-10">
        {!report && (
          <React.Fragment>
            <p className="mb-8 max-w-2xl text-sm leading-relaxed text-[var(--text-muted)]">
              Drop in the five SAP exports below. The console cross-checks every open order line against
              current stock, strips anything you can't actually fulfil, and rolls the rest up by region,
              customer and location — the same logic as the manual workbook, minus the manual part.
            </p>

            <div className="mb-8 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-5">
              {SOURCES.map((s, idx) => {
                const IconComp = s.icon;
                const up = uploads[s.id];
                const isParsing = parsing[s.id];
                const error = parseErrors[s.id];
                return (
                  <div key={s.id} className={"group relative flex flex-col rounded-lg border p-4 transition " +
                    (up ? "border-[var(--success-border)] bg-[var(--success-bg)]" : error ? "border-[var(--danger-border)] bg-[var(--danger-bg)]" : "border-[var(--border)] bg-[var(--panel)] hover:border-[var(--border-strong)]")}>
                    <div className="mb-3 flex items-center justify-between">
                      <div className={"flex h-8 w-8 items-center justify-center rounded-md " + (up ? "bg-[var(--success-soft)] text-[var(--success)]" : "bg-[var(--border-alt)] text-[var(--text-muted)]")}>
                        {isParsing ? <LoaderIcon size={15} /> : up ? <CheckIcon size={15} /> : <IconComp size={15} />}
                      </div>
                      <span className="mono text-[10px] font-bold text-[var(--text-faint2)]">0{idx + 1}</span>
                    </div>
                    <div className="mb-1 text-[11px] font-bold uppercase tracking-wider text-[var(--text)]">{s.label}</div>
                    <div className="mb-3 text-[11px] leading-snug text-[var(--text-muted)]">{s.subtitle}</div>
                    {up ? (
                      <div className="mt-auto">
                        <div className="truncate text-[11px] font-semibold text-[var(--success)]">{up.fileName}</div>
                        <div className="mono text-[11px] text-[var(--text-secondary)]">{up.rowCount.toLocaleString()} rows</div>
                        <button onClick={() => clearFile(s.id)} className="mt-2 text-[10px] font-semibold uppercase tracking-wide text-[var(--text-secondary)] hover:text-[var(--danger)]">Remove</button>
                      </div>
                    ) : (
                      <label className="mt-auto flex cursor-pointer items-center justify-center gap-1.5 rounded-md border border-dashed border-[var(--border-strong)] py-2 text-[11px] font-semibold uppercase tracking-wide text-[var(--text-muted)] transition hover:border-[var(--accent)] hover:text-[var(--accent)]">
                        <UploadIcon size={12} />
                        {isParsing ? "Reading…" : "Upload"}
                        <input ref={(el) => (fileInputs.current[s.id] = el)} type="file" accept=".xlsx,.xls,.csv" className="hidden"
                          onChange={(e) => handleFile(s.id, e.target.files && e.target.files[0])} />
                      </label>
                    )}
                    {error && <div className="mt-2 text-[10px] font-medium text-[var(--danger-text)]">{error}</div>}
                    <div className="mt-2 border-t border-[var(--border)] pt-2 text-[10px] leading-snug text-[var(--text-faint)]">{s.hint}</div>
                  </div>
                );
              })}
            </div>

            <div className="flex flex-col items-center gap-3 rounded-lg border border-[var(--border)] bg-[var(--panel)] py-8">
              <button onClick={handleGenerate} disabled={!allUploaded || generating}
                className={"flex items-center gap-2 rounded-md px-6 py-3 text-sm font-bold uppercase tracking-wide transition " +
                  (allUploaded && !generating ? "bg-[var(--accent)] text-[var(--accent-text)] hover:bg-[var(--accent-hover)]" : "cursor-not-allowed bg-[var(--border)] text-[var(--text-faint)]")}>
                {generating ? <LoaderIcon size={16} /> : <PlayIcon size={16} />}
                {generating ? "Processing…" : "Generate Open Order Report"}
              </button>
              {!allUploaded && <span className="text-[11px] text-[var(--text-faint)]">{5 - Object.keys(uploads).length} of 5 files still needed</span>}
              {parseErrors._compute && <span className="text-[11px] text-[var(--danger-text)]">{parseErrors._compute}</span>}
            </div>
          </React.Fragment>
        )}

        {report && (
          <div>
            <div className="mb-6 grid grid-cols-2 gap-3 md:grid-cols-4">
              <KPI label="Open Order Value" value={fmtNaira(report.kpis.totalValue)} sub={report.kpis.totalLines + " lines"} />
              <KPI label="Fulfillable Now" value={fmtNaira(report.kpis.keptValue)} sub={report.kpis.keptLines + " lines"} accent="var(--success)" />
              <KPI label="Blocked — Out of Stock" value={fmtNaira(report.kpis.oosValue)} sub={report.kpis.oosLines + " lines"} accent="var(--danger)" />
              <KPI label="Customers in Output" value={report.kpis.customers} sub="unique accounts" />
            </div>

            {(report.issues.missingCustomer.size > 0 || report.issues.missingMaterial.size > 0 || report.issues.missingStock.size > 0 || report.issues.missingPrice > 0) && (
              <div className="mb-6 rounded-lg border border-[var(--danger-border)] bg-[var(--danger-bg)] p-4">
                <button onClick={() => setIssuesOpen((o) => !o)} className="flex w-full items-center justify-between text-left">
                  <span className="flex items-center gap-2 text-xs font-bold uppercase tracking-wide text-[var(--danger-text)]">
                    <AlertIcon size={14} /> Master data gaps detected — some figures default to zero
                  </span>
                  {issuesOpen ? <ChevronDownIcon size={16} className="text-[var(--danger-text)]" /> : <ChevronRightIcon size={16} className="text-[var(--danger-text)]" />}
                </button>
                {issuesOpen && (
                  <div className="mt-3 grid grid-cols-1 gap-2 text-[11px] text-[var(--danger-muted)] sm:grid-cols-2">
                    {report.issues.missingCustomer.size > 0 && <div>• {report.issues.missingCustomer.size} customer code(s) not found in Customer Master</div>}
                    {report.issues.missingMaterial.size > 0 && <div>• {report.issues.missingMaterial.size} material(s) not found in Material Master (pack size defaulted to 0)</div>}
                    {report.issues.missingStock.size > 0 && <div>• {report.issues.missingStock.size} material(s) not found in Stock export (treated as out of stock)</div>}
                    {report.issues.missingPrice > 0 && <div>• {report.issues.missingPrice} line(s) had no matching price in Order Value export</div>}
                  </div>
                )}
              </div>
            )}

            <div className="mb-4 flex items-center justify-between border-b border-[var(--border)]">
              <div className="flex gap-1">
                {[{ id: "overview", label: "New Open Sales Order" }, { id: "lines", label: "Order Lines" }, { id: "oos", label: "Out of Stock" }].map((t) => (
                  <button key={t.id} onClick={() => setTab(t.id)}
                    className={"px-4 py-2.5 text-xs font-bold uppercase tracking-wide transition " +
                      (tab === t.id ? "border-b-2 border-[var(--accent)] text-[var(--text)]" : "border-b-2 border-transparent text-[var(--text-secondary)] hover:text-[var(--text-muted)]")}>
                    {t.label}
                  </button>
                ))}
              </div>
              <div className="mb-1 flex items-center gap-2">
                <button onClick={() => printCurrentView(tab, report)} className="flex items-center gap-1.5 rounded-md border border-[var(--border-alt)] px-3 py-2 text-[11px] font-bold uppercase tracking-wide text-[var(--text)] transition hover:border-[var(--border-hover)] hover:bg-[var(--panel-alt)]">
                  <PrinterIcon size={13} /> Print (Excel)
                </button>
                <button onClick={() => downloadWorkbook(report)} className="flex items-center gap-1.5 rounded-md bg-[var(--accent)] px-3 py-2 text-[11px] font-bold uppercase tracking-wide text-[var(--accent-text)] transition hover:bg-[var(--accent-hover)]">
                  <DownloadIcon size={13} /> Download Workbook
                </button>
              </div>
            </div>

            {tab === "overview" && <PivotTable rows={report.newOpenSalesOrder} />}
            {tab === "lines" && <LinesTable rows={report.withoutOOS} />}
            {tab === "oos" && <OosTable rows={report.computed.filter((r) => !r.keep)} />}
          </div>
        )}
      </main>
    </div>
  );
}

function KPI({ label, value, sub, accent = "var(--text)" }) {
  return (
    <div className="rounded-lg border border-[var(--border)] bg-[var(--panel)] p-4">
      <div className="text-[10px] font-bold uppercase tracking-wider text-[var(--text-secondary)]">{label}</div>
      <div className="mono mt-1 text-xl font-extrabold" style={{ color: accent }}>{value}</div>
      <div className="mt-0.5 text-[10px] text-[var(--text-faint)]">{sub}</div>
    </div>
  );
}

function PivotTable({ rows }) {
  const totals = rows.reduce((acc, r) => ({ qty: acc.qty + r.qty, volume: acc.volume + r.volume, netValue: acc.netValue + r.netValue, qtyDR: acc.qtyDR + r.qtyDR }),
    { qty: 0, volume: 0, netValue: 0, qtyDR: 0 });
  return (
    <div className="overflow-hidden rounded-lg border border-[var(--border)]">
      <div className="overflow-x-auto">
        <table className="w-full text-left text-[12px]">
          <thead>
            <tr className="border-b border-[var(--border)] bg-[var(--panel)] text-[10px] font-bold uppercase tracking-wider text-[var(--text-secondary)]">
              <th className="px-4 py-3">Region</th><th className="px-4 py-3">Customer</th><th className="px-4 py-3">Location</th>
              <th className="px-4 py-3 text-right">Qty</th><th className="px-4 py-3 text-right">Volume</th>
              <th className="px-4 py-3 text-right">Net Value</th><th className="px-4 py-3 text-right">Qty (DR)</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r, i) => (
              <tr key={i} className={"border-b border-[var(--row-border)] " + (i % 2 ? "bg-[var(--row-alt)]" : "bg-[var(--panel)]")}>
                <td className="px-4 py-2.5 text-[var(--text-muted)]">{r.region}</td>
                <td className="px-4 py-2.5 font-medium text-[var(--text)]">{r.customerName}</td>
                <td className="px-4 py-2.5 text-[var(--text-muted)]">{r.location}</td>
                <td className="mono px-4 py-2.5 text-right text-[var(--text-muted)]">{fmtNum(r.qty)}</td>
                <td className="mono px-4 py-2.5 text-right text-[var(--text-muted)]">{fmtNum(r.volume)}</td>
                <td className="mono px-4 py-2.5 text-right font-semibold text-[var(--text)]">{fmtNaira(r.netValue)}</td>
                <td className="mono px-4 py-2.5 text-right text-[var(--text-muted)]">{fmtNum(r.qtyDR)}</td>
              </tr>
            ))}
          </tbody>
          <tfoot>
            <tr className="border-t border-[var(--border-strong)] bg-[var(--panel-alt)] text-[12px] font-bold text-[var(--text)]">
              <td className="px-4 py-3" colSpan={3}>Total — {rows.length} customer / location combinations</td>
              <td className="mono px-4 py-3 text-right">{fmtNum(totals.qty)}</td>
              <td className="mono px-4 py-3 text-right">{fmtNum(totals.volume)}</td>
              <td className="mono px-4 py-3 text-right text-[var(--accent)]">{fmtNaira(totals.netValue)}</td>
              <td className="mono px-4 py-3 text-right">{fmtNum(totals.qtyDR)}</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  );
}

function LinesTable({ rows }) {
  return (
    <div className="overflow-hidden rounded-lg border border-[var(--border)]">
      <div className="max-h-[560px] overflow-auto">
        <table className="w-full text-left text-[12px]">
          <thead className="sticky top-0 bg-[var(--panel)]">
            <tr className="border-b border-[var(--border)] text-[10px] font-bold uppercase tracking-wider text-[var(--text-secondary)]">
              <th className="px-4 py-3">Item</th><th className="px-4 py-3">Customer</th><th className="px-4 py-3">Location</th>
              <th className="px-4 py-3 text-right">Qty</th><th className="px-4 py-3 text-right">Net Value</th><th className="px-4 py-3">Cur</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r) => (
              <tr key={r.id} className="border-b border-[var(--row-border)] odd:bg-[var(--panel)] even:bg-[var(--row-alt)]">
                <td className="px-4 py-2 text-[var(--text)]">{r.itemDescription}</td>
                <td className="px-4 py-2 text-[var(--text-muted)]">{r.customerName}</td>
                <td className="px-4 py-2 text-[var(--text-muted)]">{r.location}</td>
                <td className="mono px-4 py-2 text-right text-[var(--text-muted)]">{fmtNum(r.qty)}</td>
                <td className="mono px-4 py-2 text-right font-medium text-[var(--text)]">{fmtNaira(r.netValue)}</td>
                <td className="px-4 py-2 text-[var(--text-faint)]">{r.cur}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

function OosTable({ rows }) {
  return (
    <div className="overflow-hidden rounded-lg border border-[var(--border)]">
      <div className="max-h-[560px] overflow-auto">
        <table className="w-full text-left text-[12px]">
          <thead className="sticky top-0 bg-[var(--panel)]">
            <tr className="border-b border-[var(--border)] text-[10px] font-bold uppercase tracking-wider text-[var(--text-secondary)]">
              <th className="px-4 py-3">Item</th><th className="px-4 py-3">Customer</th>
              <th className="px-4 py-3 text-right">Qty Ordered</th><th className="px-4 py-3 text-right">Qty Available</th><th className="px-4 py-3 text-right">Value Blocked</th>
            </tr>
          </thead>
          <tbody>
            {rows.map((r) => (
              <tr key={r.id} className="border-b border-[var(--row-border)] odd:bg-[var(--panel)] even:bg-[var(--row-alt)]">
                <td className="px-4 py-2 text-[var(--text)]">{r.itemDescription}</td>
                <td className="px-4 py-2 text-[var(--text-muted)]">{r.customerName}</td>
                <td className="mono px-4 py-2 text-right text-[var(--text-muted)]">{fmtNum(r.qty)}</td>
                <td className="mono px-4 py-2 text-right text-[var(--danger)]">{fmtNum(r.inventory, 1)}</td>
                <td className="mono px-4 py-2 text-right font-medium text-[var(--text)]">{fmtNaira(r.netValue)}</td>
              </tr>
            ))}
            {rows.length === 0 && (
              <tr><td colSpan={5} className="px-4 py-8 text-center text-[var(--text-faint)]">
                <PackageXIcon className="mx-auto mb-2" size={20} />
                Nothing out of stock — every line can be fulfilled.
              </td></tr>
            )}
          </tbody>
        </table>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OpenOrderConsole />);
</script>
</body>
</html>
